services:
  web:
    build: .
    container_name: lamp-web
    ports:
      - "8080:80"
    volumes:
      - ./project:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: nextgenlabs
      DB_USER: appuser
      DB_PASS: apppass

  db:
    image: mysql:8.4
    container_name: lamp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nextgenlabs
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: lamp-pma
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"

volumes:
  db_data: